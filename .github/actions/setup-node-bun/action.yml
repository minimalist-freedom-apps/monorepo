name: Setup Node and Bun

description: Setup Bun, setup Node.js, restore caches, and install dependencies.

inputs:
  bun-version:
    description: Bun version to install.
    required: false
    default: '1.3.10'

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'

    - name: Cache Bun download cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-cache-${{ runner.os }}-${{ inputs.bun-version }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-cache-${{ runner.os }}-${{ inputs.bun-version }}-
          bun-cache-${{ runner.os }}-

    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          node-modules-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
