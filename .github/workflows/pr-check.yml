name: Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node + Bun + install
        uses: ./.github/actions/setup-node-bun

      - name: Check lockfile install
        run: bun install --frozen-lockfile

      - name: Check (format, organize imports)
        run: bun run check

      - name: Lint (biome + eslint)
        run: bun run lint

      - name: Run Knip
        run: bun run knip

      - name: TypeScript check
        run: bunx nx affected -t typecheck --base=${{ github.event.pull_request.base.sha || github.event.before }} --head=${{ github.sha }} --parallel=3 --output-style=stream --verbose

      - name: Verify requirements
        run: bun run requirements:verify

      - name: Run affected unit tests
        run: bunx nx affected -t test --base=${{ github.event.pull_request.base.sha || github.event.before }} --head=${{ github.sha }} --parallel=3 --output-style=stream --verbose

      - name: Build apps
        run: |
          set -euo pipefail
          for app in apps/*; do
            if [ -d "$app" ]; then
              echo "Building $app"
              bun --cwd "$app" run build
            fi
          done
